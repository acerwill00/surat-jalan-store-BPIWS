<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Surat Jalan - Surat Jalan Generator</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/bauer-logo.jpeg" alt="Logo" style="height: 30px;" class="me-2">STORE
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <!-- Nav items rendered dynamically based on role -->
                    <li class="nav-item admin-only">
                        <a class="nav-link" href="index.html">Master Barang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="form_sj.html">Buat Surat Jalan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="list_sj.html">Daftar Surat Jalan</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="me-3 text-muted small"><i class="bi bi-person-circle me-1"></i><span id="navUsername">User</span></span>
                    <button class="btn btn-sm btn-outline-danger shadow-sm rounded-pill px-3" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4 fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="page-title"><i class="bi bi-journal-text me-2"></i>Daftar Surat Jalan</h1>
            <a href="form_sj.html" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-lg me-2"></i>Buat Baru
            </a>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th width="15%">No. SJ</th>
                            <th width="15%">Tanggal</th>
                            <th width="20%">Tujuan</th>
                            <th width="15%">Pembuat</th>
                            <th width="15%">Status</th>
                            <th width="20%" class="text-end">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="sjTableBody">
                        <!-- Data populated by JS -->
                        <tr><td colspan="6" class="text-center py-4 text-muted">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            loadRecordSuratJalan();
        });
    </script>
</body>
</html>
